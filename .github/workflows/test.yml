name: Test
on:
  push:
    branches: [main, "feat/**"]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Runtime
        uses: savvy-web/workflow-runtime-action@main

      - name: Typecheck
        run: pnpm typecheck

      - name: Lint
        run: pnpm lint

      - name: Test
        run: pnpm test

  integration-test:
    name: Integration - ${{ matrix.name }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          # Real event -- push to feature branch
          - name: "Push to feature branch -> skip"
            fixture: pnpm-basic
            expected-phase: skip
            expected-reason-contains: no actionable event

          # Mocked event -- push to main with changesets -> silk-branch
          - name: "Push to main with changesets -> silk-branch"
            fixture: pnpm-basic-changesets
            mock-event: push
            mock-ref: refs/heads/main
            mock-sha: abc123test
            mock-event-payload: .github/workflows/__fixtures__/events/push-main.json
            expected-phase: silk-branch
            expected-reason-contains: changesets detected

          # Mocked event -- push to release branch -> silk-validate
          - name: "Push to release branch -> silk-validate"
            fixture: pnpm-basic-changesets
            mock-event: push
            mock-ref: refs/heads/changeset-release/main
            mock-sha: def456test
            mock-event-payload: .github/workflows/__fixtures__/events/push-release-branch.json
            expected-phase: silk-validate
            expected-reason-contains: push to release branch

          # Mocked event -- PR merged (release PR) -> close-issues
          - name: "Release PR merged -> close-issues"
            fixture: pnpm-basic
            mock-event: pull_request
            mock-ref: refs/pull/42/merge
            mock-sha: merged123test
            mock-event-payload: .github/workflows/__fixtures__/events/pr-merged-release.json
            expected-phase: close-issues
            expected-reason-contains: release PR merged

          # Mocked event -- PR open (release PR) -> silk-validate
          - name: "Release PR open -> silk-validate"
            fixture: pnpm-basic
            mock-event: pull_request
            mock-ref: refs/pull/43/merge
            mock-sha: propen123test
            mock-event-payload: .github/workflows/__fixtures__/events/pr-open-release.json
            expected-phase: silk-validate
            expected-reason-contains: release PR open

          # Mocked event -- push to main with no changesets -> skip
          - name: "Push to main no changesets -> skip"
            fixture: pnpm-basic
            mock-event: push
            mock-ref: refs/heads/main
            mock-sha: nocs123test
            mock-event-payload: .github/workflows/__fixtures__/events/push-main.json
            expected-phase: skip
            expected-reason-contains: no changesets

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Runtime
        uses: savvy-web/workflow-runtime-action@main

      - name: Build
        run: pnpm build:prod

      - name: Test fixture
        uses: ./.github/actions/test-fixture
        with:
          fixture: ${{ matrix.fixture }}
          title: ${{ matrix.name }}
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}
          mock-event: ${{ matrix.mock-event || '' }}
          mock-ref: ${{ matrix.mock-ref || '' }}
          mock-sha: ${{ matrix.mock-sha || '' }}
          mock-event-payload: ${{ matrix.mock-event-payload || '' }}
          expected-phase: ${{ matrix.expected-phase }}
          expected-reason-contains: ${{ matrix.expected-reason-contains }}
