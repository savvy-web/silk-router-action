name: Local Integration Test
on:
  push:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Run silk-router
        id: silk-router
        uses: ./.github/actions/local
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}

      - name: Check outputs
        env:
          PHASE: ${{ steps.silk-router.outputs.next-phase }}
          REASON: ${{ steps.silk-router.outputs.reason }}
        run: |
          echo "next-phase: $PHASE"
          echo "reason: $REASON"
