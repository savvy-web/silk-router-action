name: GitHub Action Template
description: Boilerplate repo for setting up a GitHub Marketplace action with @savvy-web/github-action-builder and @savvy-web/github-action-effect
branding:
  icon: package
  color: blue
inputs:
  app-id:
    description: GitHub App ID for authentication
    required: true
  private-key:
    description: GitHub App private key (PEM format)
    required: true
outputs:
  demo-output:
    description: Define your outputs here (e.g., 'demo-output' is just an example)
runs:
  using: node24
  pre: dist/pre.js
  main: dist/main.js
  post: dist/post.js
